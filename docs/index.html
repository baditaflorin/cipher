<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cipher</title>
    <meta
      name="description"
      content="Static, browser-only encrypted group chat with no server-held group state."
    />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #101512;
        color: #f3f7f1;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100% - 48px));
      }

      a {
        color: #7dd7c7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Cipher</h1>
      <p>
        Browser-only encrypted group chat. The full app is being built into this
        GitHub Pages URL.
      </p>
      <p>
        Repo:
        <a href="https://github.com/baditaflorin/cipher">
          https://github.com/baditaflorin/cipher
        </a>
      </p>
      <p>
        Support:
        <a href="https://www.paypal.com/paypalme/florinbadita">
          https://www.paypal.com/paypalme/florinbadita
        </a>
      </p>
    </main>
  </body>
</html>
